<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma ENEM — Luan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --font: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --bg: #0f0f0f;
  --bg2: #161616;
  --surface: #1e1e1e;
  --surface2: #262626;
  --border: #2e2e2e;
  --text: #e8e6e1;
  --text-muted: #888;
  --text-xmuted: #555;
  --blue: #3b82f6;
  --blue-dim: #1e3a5f;
  --blue-light: rgba(59,130,246,0.15);
  --green: #22c55e;
  --green-light: rgba(34,197,94,0.12);
  --red: #ef4444;
  --radius: 8px;
  --radius-sm: 5px;
  --shadow-md: 0 4px 20px rgba(0,0,0,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); }
#app { display: flex; flex-direction: column; height: 100vh; }

/* ── TOOLBAR ── */
#toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; height: 48px;
}
#toolbar h1 {
  font-size: 14px; font-weight: 600; flex: 1;
  display: flex; align-items: center; gap: 7px;
}
#toolbar h1 .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); display: inline-block; }
.tb-btn {
  padding: 5px 11px; font-size: 12px; font-family: var(--font); font-weight: 500;
  border-radius: var(--radius-sm); cursor: pointer;
  border: 1px solid var(--border); background: var(--surface); color: var(--text-muted);
  display: inline-flex; align-items: center; gap: 5px;
  transition: all 0.15s; white-space: nowrap;
}
.tb-btn:hover { background: var(--surface2); color: var(--text); }
#upload-btn { color: var(--blue); border-color: var(--blue-dim); background: var(--blue-light); }
#upload-btn:hover { background: rgba(59,130,246,0.25); }
#highlight-btn {
  padding: 5px 11px; font-size: 12px; font-family: var(--font); font-weight: 500;
  border-radius: var(--radius-sm); cursor: pointer;
  background: rgba(245,158,11,0.15); color: #fbbf24;
  border: 1px solid rgba(245,158,11,0.3); display: none;
  align-items: center; gap: 5px; transition: all 0.15s;
}
#highlight-btn:hover { background: rgba(245,158,11,0.25); }
#clear-highlights-btn { display: none; }
#clear-highlights-btn:hover { background: rgba(239,68,68,0.12); color: var(--red); border-color: #7f1d1d; }
#mode-toggle {
  display: none; align-items: center; gap: 2px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 2px;
}
.mode-btn {
  padding: 3px 9px; font-size: 11px; font-family: var(--font); font-weight: 500;
  border-radius: 4px; border: none; background: transparent;
  color: var(--text-muted); cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.mode-btn.active { background: var(--surface2); color: var(--blue); }
#page-nav { display: flex; align-items: center; gap: 6px; }
#page-nav button {
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  font-size: 13px; cursor: pointer; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--surface); color: var(--text-muted);
  transition: all 0.15s;
}
#page-nav button:hover { background: var(--surface2); color: var(--text); }
#page-info { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; min-width: 40px; text-align: center; }

/* ── MAIN ── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── PDF ── */
#pdf-area {
  flex: 1; overflow-y: auto; background: #111;
  display: flex; flex-direction: column;
  align-items: center; padding: 20px 20px 32px; gap: 16px;
}
#pdf-placeholder {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%; cursor: pointer;
}
.placeholder-box {
  background: var(--surface); border: 1.5px dashed var(--border);
  border-radius: 12px; padding: 40px 56px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  transition: border-color 0.2s, background 0.2s;
}
.placeholder-box:hover { border-color: var(--blue); background: rgba(59,130,246,0.05); }
.placeholder-box i { font-size: 40px; color: var(--text-xmuted); }
.placeholder-box span { font-size: 14px; color: var(--text-muted); font-weight: 500; }
.placeholder-box small { font-size: 12px; color: var(--text-xmuted); }
.canvas-wrapper {
  position: relative; display: inline-block;
  box-shadow: 0 4px 24px rgba(0,0,0,0.6);
  border-radius: 2px; line-height: 0;
}
canvas.pdf-page { display: block; cursor: text; }
canvas.pdf-page.draw-mode { cursor: crosshair; }
canvas.highlight-overlay { position: absolute; top: 0; left: 0; pointer-events: none; }

/* ── SIDEBAR ── */
#sidebar {
  width: 256px; flex-shrink: 0;
  border-left: 1px solid var(--border);
  background: var(--bg2);
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar-header { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); }
#sidebar-header h2 { font-size: 13px; font-weight: 600; }
.progress-summary { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
#progress-bar { flex: 1; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
#progress-fill { height: 100%; background: var(--blue); border-radius: 99px; transition: width 0.4s; width: 0%; }
#progress-label { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; font-weight: 500; }
#questions-list {
  flex: 1; overflow-y: auto; padding: 6px 8px;
  display: flex; flex-direction: column; gap: 2px;
}
#questions-list::-webkit-scrollbar { width: 4px; }
#questions-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.q-item {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px 5px 6px; border-radius: var(--radius-sm);
  border: 1px solid transparent; transition: border-color 0.15s, background 0.15s;
}
.q-item:hover { background: var(--surface); }
.q-item.answered { background: var(--green-light); border-color: rgba(34,197,94,0.2); }
.q-num { font-size: 11px; font-weight: 600; color: var(--text-xmuted); min-width: 22px; font-family: var(--font-mono); text-align: right; }
.q-item.answered .q-num { color: var(--green); }
.q-badge {
  width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-family: var(--font-mono); font-weight: 500;
  border-radius: 50%; flex-shrink: 0; background: var(--green); color: #0a0a0a;
  opacity: 0; transform: scale(0.6); transition: opacity 0.2s, transform 0.2s;
}
.q-item.answered .q-badge { opacity: 1; transform: scale(1); }
.q-opts { display: flex; gap: 2px; margin-left: auto; }
.opt-btn {
  width: 22px; height: 22px; font-size: 10px; font-weight: 600;
  border-radius: 50%; cursor: pointer; border: 1px solid var(--border);
  background: transparent; color: var(--text-xmuted); font-family: var(--font); transition: all 0.12s;
}
.opt-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
.opt-btn.selected { background: var(--blue); color: white; border-color: var(--blue); }
#sidebar-footer { padding: 10px 12px 12px; border-top: 1px solid var(--border); }
#flashcard-btn {
  padding: 9px; font-size: 13px; font-family: var(--font); font-weight: 600;
  border-radius: var(--radius); cursor: pointer; width: 100%;
  background: var(--blue); color: white; border: none;
  display: none; align-items: center; justify-content: center; gap: 7px;
  transition: background 0.15s, transform 0.1s;
}
#flashcard-btn:hover { background: #2563eb; }
#flashcard-btn:active { transform: scale(0.98); }

/* ── OVERLAY ── */
#flashcard-overlay {
  display: none; position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
  z-index: 100; align-items: center; justify-content: center;
}
#flashcard-overlay.open { display: flex; }

#fc-card {
  display: flex; flex-direction: column;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; width: 560px; max-height: 82vh;
  box-shadow: var(--shadow-md); overflow: hidden;
}
#fc-card-header {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
#fc-card-header h3 { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 7px; }
#fc-count { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }

#fc-text-box {
  flex: 1; overflow-y: auto; padding: 16px 18px;
  font-family: var(--font-mono); font-size: 13px; line-height: 1.9;
  color: var(--text); white-space: pre-wrap; background: var(--bg2);
  border-bottom: 1px solid var(--border);
  user-select: all; /* facilita selecionar tudo */
}
#fc-text-box::-webkit-scrollbar { width: 4px; }
#fc-text-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

#fc-footer {
  padding: 12px 18px; display: flex; gap: 8px; align-items: center; flex-shrink: 0;
}
#fc-footer p { flex: 1; font-size: 11px; color: var(--text-muted); line-height: 1.5; }
.fc-btn {
  padding: 8px 14px; font-size: 12px; font-family: var(--font); font-weight: 600;
  border-radius: var(--radius-sm); cursor: pointer; border: none;
  transition: all 0.15s; white-space: nowrap;
  display: flex; align-items: center; gap: 5px;
}
#btn-copy { background: var(--blue); color: white; }
#btn-copy:hover { background: #2563eb; }
#btn-copy.ok { background: var(--green); }
#btn-dl { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
#btn-dl:hover { background: var(--border); color: var(--text); }
#btn-close { background: transparent; color: var(--text-xmuted); border: 1px solid var(--border); }
#btn-close:hover { background: var(--surface2); color: var(--text); }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(6px);
  background: var(--surface2); color: var(--text); border: 1px solid var(--border);
  padding: 7px 16px; border-radius: 99px; font-size: 12px; font-weight: 500;
  z-index: 200; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <h1><span class="dot"></span>Plataforma ENEM</h1>
    <div id="mode-toggle">
      <button class="mode-btn active" id="btn-mode-select" onclick="setMode('select')"><i class="ti ti-cursor-text"></i> Texto</button>
      <button class="mode-btn" id="btn-mode-draw" onclick="setMode('draw')"><i class="ti ti-highlight"></i> Grifo</button>
    </div>
    <button id="highlight-btn" onclick="applySelectionHighlight()"><i class="ti ti-highlight"></i> Grifar seleção</button>
    <button id="clear-highlights-btn" class="tb-btn" onclick="clearPageHighlights()"><i class="ti ti-eraser"></i> Limpar grifos</button>
    <div id="page-nav" style="display:none">
      <button onclick="changePage(-1)"><i class="ti ti-chevron-left"></i></button>
      <span id="page-info">1 / 1</span>
      <button onclick="changePage(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
    <label id="upload-btn" class="tb-btn" for="file-input"><i class="ti ti-upload"></i> Carregar prova</label>
    <input type="file" id="file-input" accept=".pdf" style="display:none" onchange="loadPDF(this)">
  </div>

  <div id="main">
    <div id="pdf-area" onclick="triggerUpload()">
      <div id="pdf-placeholder">
        <div class="placeholder-box">
          <i class="ti ti-file-upload"></i>
          <span>Carregar PDF da prova</span>
          <small>Caderno com 45 questões · clique para escolher</small>
        </div>
      </div>
    </div>

    <div id="sidebar">
      <div id="sidebar-header">
        <h2>Gabarito</h2>
        <div class="progress-summary">
          <div id="progress-bar"><div id="progress-fill"></div></div>
          <span id="progress-label">0 / 45</span>
        </div>
      </div>
      <div id="questions-list"></div>
      <div id="sidebar-footer">
        <button id="flashcard-btn" onclick="openFlashcards()">
          <i class="ti ti-file-export"></i> Gerar resumo para IA
        </button>
      </div>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div id="flashcard-overlay">
  <div id="fc-card">
    <div id="fc-card-header">
      <h3><i class="ti ti-file-text"></i> Suas respostas</h3>
      <span id="fc-count"></span>
    </div>
    <div id="fc-text-box"></div>
    <div id="fc-footer">
      <p>Cole este texto em qualquer IA junto com o gabarito oficial para conferir seus acertos e erros.</p>
      <button class="fc-btn" id="btn-dl" onclick="downloadTxt()"><i class="ti ti-download"></i> .txt</button>
      <button class="fc-btn" id="btn-copy" onclick="copyText()"><i class="ti ti-copy"></i> Copiar</button>
      <button class="fc-btn" id="btn-close" onclick="closeFlashcards()">Fechar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ════ STATE ════ */
const answers    = {};
const highlights = {};
let pdfDoc = null, currentPage = 1, totalPages = 0, rendering = false;
let currentMode = 'select', isDrawing = false, drawStart = null, currentPath = [];

/* ════ SIDEBAR ════ */
function buildSidebar() {
  const list = document.getElementById('questions-list');
  list.innerHTML = '';
  for (let i = 1; i <= 45; i++) {
    const item = document.createElement('div');
    item.className = 'q-item' + (answers[i] ? ' answered' : '');
    item.id = 'q-' + i;

    const num = document.createElement('span');
    num.className = 'q-num';
    num.textContent = i < 10 ? '0' + i : i;

    const badge = document.createElement('span');
    badge.className = 'q-badge'; badge.id = 'q-badge-' + i;
    badge.textContent = answers[i] || '';

    const optsDiv = document.createElement('div');
    optsDiv.className = 'q-opts';
    ['A','B','C','D','E'].forEach(l => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn' + (answers[i] === l ? ' selected' : '');
      btn.textContent = l;
      btn.onclick = (e) => { e.stopPropagation(); selectAnswer(i, l, btn); };
      optsDiv.appendChild(btn);
    });

    item.appendChild(num); item.appendChild(badge); item.appendChild(optsDiv);
    list.appendChild(item);
  }
}

function selectAnswer(qNum, letter, btn) {
  const item = document.getElementById('q-' + qNum);
  item.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  const badge = document.getElementById('q-badge-' + qNum);
  if (answers[qNum] === letter) {
    delete answers[qNum]; item.classList.remove('answered'); badge.textContent = '';
  } else {
    answers[qNum] = letter; btn.classList.add('selected');
    item.classList.add('answered'); badge.textContent = letter;
  }
  updateProgress();
}

function updateProgress() {
  const count = Object.keys(answers).length;
  document.getElementById('progress-label').textContent = count + ' / 45';
  document.getElementById('progress-fill').style.width = Math.round((count/45)*100) + '%';
  document.getElementById('flashcard-btn').style.display = count > 0 ? 'flex' : 'none';
}

/* ════ PDF ════ */
function triggerUpload() { if (!pdfDoc) document.getElementById('file-input').click(); }

function loadPDF(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    pdfDoc = await pdfjsLib.getDocument(new Uint8Array(e.target.result)).promise;
    totalPages = pdfDoc.numPages; currentPage = 1;
    document.getElementById('pdf-placeholder').style.display = 'none';
    document.getElementById('pdf-area').style.cursor = 'default';
    document.getElementById('pdf-area').onclick = null;
    document.getElementById('page-nav').style.display    = 'flex';
    document.getElementById('mode-toggle').style.display = 'flex';
    document.getElementById('clear-highlights-btn').style.display = 'inline-flex';
    renderPage(currentPage);
  };
  reader.readAsArrayBuffer(file);
}

async function renderPage(num) {
  if (rendering) return; rendering = true;
  const pdfArea = document.getElementById('pdf-area');
  pdfArea.querySelectorAll('.canvas-wrapper').forEach(w => w.remove());
  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale: 1.5 });
  const wrapper = document.createElement('div');
  wrapper.className = 'canvas-wrapper';
  wrapper.style.width = viewport.width + 'px'; wrapper.style.height = viewport.height + 'px';
  const pdfCanvas = document.createElement('canvas');
  pdfCanvas.className = 'pdf-page'; pdfCanvas.width = viewport.width; pdfCanvas.height = viewport.height;
  if (currentMode === 'draw') pdfCanvas.classList.add('draw-mode');
  const overlayCanvas = document.createElement('canvas');
  overlayCanvas.className = 'highlight-overlay';
  overlayCanvas.width = viewport.width; overlayCanvas.height = viewport.height;
  overlayCanvas.style.width = viewport.width + 'px'; overlayCanvas.style.height = viewport.height + 'px';
  wrapper.appendChild(pdfCanvas); wrapper.appendChild(overlayCanvas);
  pdfArea.insertBefore(wrapper, pdfArea.firstChild);
  await page.render({ canvasContext: pdfCanvas.getContext('2d'), viewport }).promise;
  redrawHighlights(num, overlayCanvas);
  bindDrawEvents(overlayCanvas, pdfCanvas, num, viewport);
  pdfCanvas.addEventListener('mouseup', onTextMouseUp);
  document.getElementById('page-info').textContent = num + ' / ' + totalPages;
  rendering = false;
}

function changePage(dir) {
  const next = currentPage + dir;
  if (next < 1 || next > totalPages) return;
  document.getElementById('highlight-btn').style.display = 'none';
  currentPage = next; renderPage(currentPage);
}

/* ════ MODE ════ */
function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-mode-select').classList.toggle('active', mode === 'select');
  document.getElementById('btn-mode-draw').classList.toggle('active', mode === 'draw');
  const pdfCanvas = document.querySelector('canvas.pdf-page');
  if (pdfCanvas) pdfCanvas.classList.toggle('draw-mode', mode === 'draw');
  const overlay = document.querySelector('canvas.highlight-overlay');
  if (overlay) overlay.style.pointerEvents = mode === 'draw' ? 'all' : 'none';
  if (mode === 'draw') { document.getElementById('highlight-btn').style.display = 'none'; window.getSelection()?.removeAllRanges(); }
  showToast(mode === 'draw' ? 'Modo grifo — arraste para marcar' : 'Modo seleção de texto');
}

/* ════ DRAW ════ */
function bindDrawEvents(overlay, pdfCanvas, pageNum, viewport) {
  overlay.style.pointerEvents = currentMode === 'draw' ? 'all' : 'none';
  function getPos(e) {
    const r = overlay.getBoundingClientRect();
    return { x: (e.clientX - r.left) * (viewport.width / r.width), y: (e.clientY - r.top) * (viewport.height / r.height) };
  }
  overlay.addEventListener('mousedown', (e) => { if (currentMode !== 'draw') return; e.preventDefault(); isDrawing = true; drawStart = getPos(e); currentPath = [drawStart]; });
  overlay.addEventListener('mousemove', (e) => {
    if (!isDrawing || currentMode !== 'draw') return;
    currentPath.push(getPos(e));
    redrawHighlights(pageNum, overlay); drawLiveStroke(overlay.getContext('2d'), currentPath);
  });
  overlay.addEventListener('mouseup', (e) => {
    if (!isDrawing || currentMode !== 'draw') return; isDrawing = false; currentPath.push(getPos(e));
    if (!highlights[pageNum]) highlights[pageNum] = [];
    if (currentPath.length <= 2) highlights[pageNum].push({ type:'dot', x:drawStart.x, y:drawStart.y, r:8 });
    else highlights[pageNum].push({ type:'path', points:[...currentPath] });
    currentPath = []; redrawHighlights(pageNum, overlay); saveToSession();
  });
  overlay.addEventListener('mouseleave', (e) => {
    if (!isDrawing || currentMode !== 'draw') return; isDrawing = false;
    if (currentPath.length > 2) { if (!highlights[pageNum]) highlights[pageNum] = []; highlights[pageNum].push({ type:'path', points:[...currentPath] }); }
    currentPath = []; redrawHighlights(pageNum, overlay); saveToSession();
  });
}

function drawLiveStroke(ctx, path) {
  if (!path || path.length < 2) return;
  ctx.save(); ctx.globalCompositeOperation = 'multiply';
  ctx.strokeStyle = 'rgba(251,191,36,0.65)'; ctx.lineWidth = 18; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y);
  for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
  ctx.stroke(); ctx.restore();
}

function redrawHighlights(pageNum, overlayCanvas) {
  const ctx = overlayCanvas.getContext('2d');
  ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  const strokes = highlights[pageNum]; if (!strokes || !strokes.length) return;
  ctx.save(); ctx.globalCompositeOperation = 'multiply';
  for (const s of strokes) {
    if (s.type === 'rect' || s.type === 'text-rect') { ctx.fillStyle = 'rgba(251,191,36,0.45)'; ctx.fillRect(s.x, s.y, s.w, s.h); }
    else if (s.type === 'path') {
      ctx.strokeStyle = 'rgba(251,191,36,0.65)'; ctx.lineWidth = 18; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath(); ctx.moveTo(s.points[0].x, s.points[0].y);
      for (let i = 1; i < s.points.length; i++) ctx.lineTo(s.points[i].x, s.points[i].y); ctx.stroke();
    } else if (s.type === 'dot') { ctx.fillStyle = 'rgba(251,191,36,0.65)'; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); }
  }
  ctx.restore();
}

/* ════ TEXT SELECT ════ */
function onTextMouseUp() {
  if (currentMode !== 'select') return;
  const sel = window.getSelection();
  document.getElementById('highlight-btn').style.display = (!sel || !sel.toString().trim()) ? 'none' : 'inline-flex';
}

function applySelectionHighlight() {
  const sel = window.getSelection(); if (!sel || sel.rangeCount === 0) return;
  const overlay = document.querySelector('canvas.highlight-overlay'); if (!overlay) return;
  const r = overlay.getBoundingClientRect();
  const sx = overlay.width / r.width, sy = overlay.height / r.height;
  if (!highlights[currentPage]) highlights[currentPage] = [];
  for (const rect of Array.from(sel.getRangeAt(0).getClientRects())) {
    if (rect.width < 2 || rect.height < 2) continue;
    highlights[currentPage].push({ type:'text-rect', x:(rect.left-r.left)*sx, y:(rect.top-r.top)*sy, w:rect.width*sx, h:rect.height*sy });
  }
  sel.removeAllRanges(); document.getElementById('highlight-btn').style.display = 'none';
  redrawHighlights(currentPage, overlay); saveToSession(); showToast('Grifo aplicado!');
}

function clearPageHighlights() {
  if (!highlights[currentPage] || !highlights[currentPage].length) { showToast('Nenhum grifo nesta página'); return; }
  if (!confirm('Limpar todos os grifos desta página?')) return;
  highlights[currentPage] = [];
  const overlay = document.querySelector('canvas.highlight-overlay');
  if (overlay) overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);
  saveToSession(); showToast('Grifos removidos');
}

/* ════ SESSION ════ */
function saveToSession() { try { sessionStorage.setItem('enem_highlights', JSON.stringify(highlights)); } catch(e) {} }
function loadFromSession() {
  try { const s = sessionStorage.getItem('enem_highlights'); if (s) { const p = JSON.parse(s); for (const k in p) highlights[k] = p[k]; } } catch(e) {}
}

/* ════ TOAST ════ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ════ GERAR RESUMO PARA IA ════ */
let generatedText = '';

function buildText() {
  const items = Object.keys(answers)
    .map(k => ({ q: parseInt(k), a: answers[k] }))
    .sort((a, b) => a.q - b.q);

  const total = items.length;
  const date  = new Date().toLocaleDateString('pt-BR');

  let txt = '';
  txt += '=== MINHAS RESPOSTAS DO ENEM ===\n';
  txt += 'Data: ' + date + '\n';
  txt += 'Total marcado: ' + total + ' de 45 questões\n';
  txt += '\n';
  txt += '--- RESPOSTAS ---\n';
  for (const item of items) {
    const num = item.q < 10 ? '0' + item.q : item.q;
    txt += 'Questão ' + num + ': ' + item.a + '\n';
  }
  txt += '\n';
  txt += '--- PROMPT SUGERIDO PARA A IA ---\n';
  txt += 'Segue meu gabarito pessoal do ENEM. Cole o gabarito oficial abaixo\n';
  txt += 'e me diga: quais errei, qual foi a resposta certa e uma dica rápida\n';
  txt += 'de revisão para cada erro.\n';
  txt += '\n';
  txt += '[COLE O GABARITO OFICIAL AQUI]\n';

  return { txt, total, items };
}

function openFlashcards() {
  const { txt, total, items } = buildText();
  generatedText = txt;

  document.getElementById('fc-count').textContent = total + ' questão' + (total !== 1 ? 'ões' : '');
  document.getElementById('fc-text-box').textContent = txt;

  const copyBtn = document.getElementById('btn-copy');
  copyBtn.classList.remove('ok');
  copyBtn.innerHTML = '<i class="ti ti-copy"></i> Copiar';

  document.getElementById('flashcard-overlay').classList.add('open');
}

function copyText() {
  navigator.clipboard.writeText(generatedText).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.classList.add('ok');
    btn.innerHTML = '<i class="ti ti-check"></i> Copiado!';
    setTimeout(() => { btn.classList.remove('ok'); btn.innerHTML = '<i class="ti ti-copy"></i> Copiar'; }, 2500);
  }).catch(() => showToast('Erro ao copiar — selecione o texto manualmente'));
}

function downloadTxt() {
  const blob = new Blob([generatedText], { type: 'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'minhas_respostas_enem.txt';
  a.click(); URL.revokeObjectURL(url);
  showToast('Arquivo baixado!');
}

function closeFlashcards() {
  document.getElementById('flashcard-overlay').classList.remove('open');
}

/* ════ INIT ════ */
loadFromSession();
buildSidebar();
updateProgress();
</script>
